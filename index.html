<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("https://haowallpaper.com/link/common/file/previewFileImg/16726414906346880");
            background-position: center center;
            background-size: cover; 
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;         
        }
        
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            font-weight: 700;
            color: #FF69B4;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.2);
            margin: 40px 0;
            letter-spacing: 8px;
        }
        
        h2 {
            color: #FFFFFF;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5); 
        }

        img {
            width: 500px; 
            height: 500px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);         
        }
        
        p {
            color: #FFFFFF;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        audio {
            margin: 20px auto;
            width: 80%;
            max-width: 400px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        footer {
            margin-top: 50px; 
            text-align: center; 
            color: #eee;
            font-size: 0.9rem;
        }
        button {
            position: fixed; 
            top: 10px;      
            left: 10px;                        
            z-index: 9999;        
            padding: 10px 20px; 
            background-color: #FF69B4; 
            cursor: pointer;       
           color: #fff;           
            border: none;                     
            border-radius: 4px;               
            font-size: 14px;
            transition: background-color 0.3s; /* 添加过渡效果 */
        }
        button:hover {
            background-color: #FF1493; /* 鼠标悬停时变深粉色 */
        }
    </style>
</head>
<body>

    <h1>HAPPY BIRTHDAY TO U</h1>
    <p>师傅的生日礼物还在准备，敬请期待^^</p>
    <img src="https://haowallpaper.com/link/common/file/previewFileImg/16642249197014400" alt="线条小狗">
    
    <!-- 祝福 -->
    <h2>我的有声祝福：</h2>
    <audio controls>
        <source src="birthpray.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 背景音乐 (循环、隐藏) -->
    <audio loop hidden id="bgMusic" volume="0.1">
        <source src="dylanf-cano.mp3" type="audio/mpeg">
    </audio>

    <!-- 修改点：按钮增加了 id，并且文字默认为“开启音乐” -->
    <button id="musicToggle">🎵 开启背景音乐</button>

    <footer>
        <p>&copy; 2026 我的网页.持续更新中</p>
    </footer>

    <!-- 修改点：JavaScript 实现开关逻辑 -->
    <script>
        // 获取按钮元素和音频元素
        var btn = document.getElementById('musicToggle');
        var audio = document.getElementById('bgMusic');

        // 给按钮添加点击事件
        btn.onclick = function() {
            if (audio.paused) {
                // 如果当前是暂停状态，就播放
                audio.play();
                btn.innerHTML = '⏸ 暂停背景音乐'; // 修改按钮文字
                btn.style.backgroundColor = '#FF1493'; // 修改按钮颜色（深粉）
            } else {
                // 如果当前是播放状态，就暂停
                audio.pause();
                btn.innerHTML = '🎵 开启背景音乐'; // 修改按钮文字
                btn.style.backgroundColor = '#FF69B4'; // 修改按钮颜色（浅粉）
            }
        };
    </script>
</body>
</html>
